server {
  listen 80;
  listen [::]:80;
  server_name bpsgroup.cloud www.bpsgroup.cloud;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name bpsgroup.cloud www.bpsgroup.cloud;

  ssl_certificate /etc/letsencrypt/live/bpsgroup.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/bpsgroup.cloud/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
    default_type "text/plain";
    try_files $uri =404;
  }

  root /srv/dynamic-production-tracker/frontend/dist;
  index index.html;

  # Frontend SPA
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend API proxy
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }

  location = /health {
    proxy_pass http://127.0.0.1:4000/health;
  }

  location = /ready {
    proxy_pass http://127.0.0.1:4000/ready;
  }
}
